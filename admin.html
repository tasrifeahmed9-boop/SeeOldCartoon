<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | SeeOldCartoon</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="admin-login">

<h1>SeeOldCartoon Admin</h1>

<p>Login to manage cartoons</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Admin Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

</div>
  <div class="admin-dashboard" id="adminDashboard" style="display:none;">

<header class="admin-header">

<h2>Admin Dashboard</h2>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</header>

<div class="admin-form">

<h3>Add New Cartoon</h3>

<form id="cartoonForm">

<input
type="text"
id="title"
placeholder="Cartoon Title"
required>

<input
type="text"
id="category"
placeholder="Category (Tom & Jerry, Popeye...)"
required>

<input
type="url"
id="thumbnail"
placeholder="Thumbnail URL"
required>

<input
type="url"
id="video"
placeholder="Video URL"
required>

<textarea
id="description"
placeholder="Description"
rows="5"
required></textarea>
  <div class="checkbox-group">

<label>
<input type="checkbox" id="featured">
Featured
</label>

<label>
<input type="checkbox" id="trending">
Trending
</label>

</div>

<button type="submit" class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Cartoon

</button>

</form>

</div>

<div class="cartoon-list">

<h3>All Cartoons</h3>

<div id="cartoonList">

<p>No cartoons added yet.</p>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script type="module" src="admin.js"></script>

</body>
</html>
